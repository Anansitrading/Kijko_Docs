services:
  wikiapp:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_PATH: /app/data/data.db
      OPEN_NOTEBOOK_BASE_URL: ${OPEN_NOTEBOOK_BASE_URL:-http://open_notebook:5055}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:4141/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - wikiapp-data:/app/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/notebook.db
    user: root
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - surreal-data:/mydata
    environment:
      SURREAL_EXPERIMENTAL_GRAPHQL: "true"
    restart: unless-stopped

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    depends_on:
      - surrealdb
    environment:
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY:-change-me}
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: root
      SURREAL_PASSWORD: root
      SURREAL_NAMESPACE: open_notebook
      SURREAL_DATABASE: open_notebook
      API_URL: ${OPEN_NOTEBOOK_BASE_URL:-http://open_notebook:5055}
    ports:
      - "127.0.0.1:8502:8502"
      - "127.0.0.1:5055:5055"
    volumes:
      - notebook-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: nginx:1.26-alpine
    depends_on:
      wikiapp:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/conf.d:/etc/nginx/conf.d:ro
    restart: unless-stopped

volumes:
  wikiapp-data:
  surreal-data:
  notebook-data:
